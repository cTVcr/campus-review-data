server:
  port: 8080

spring:
  profiles:
    active: dev
  application:
    name: campus-review

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: campus-review-jwt-secret-key-2024-must-be-at-least-256-bits-long-change-in-production
  access-token-expiration: 1800000    # 30 分钟
  refresh-token-expiration: 604800000  # 7 天

# 文件存储配置
file:
  upload:
    path: ./uploads
    allowed-extensions: pdf,doc,docx,ppt,pptx,xls,xlsx,jpg,jpeg,png,md,txt,zip

# Knife4j / SpringDoc 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
